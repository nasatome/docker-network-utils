# Ofelia Cron Jobs - Trivy Vulnerability Scanner
# Schedule format: seconds minutes hours day-of-month month day-of-week
#
# Uses job-exec against the long-running trivy-scanner-runner container, so
# all bind-mounts and env vars live in docker-compose.yml (no absolute paths).
#
# Discord notifications: copy .discord-webhook.example to .discord-webhook

[job-exec "trivy-daily-scan"]
schedule = 0 0 6 * * *
container = trivy-scanner-runner
command = /scripts/scan.sh
